name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make wLib better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've thought of.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of wLib does this relate to?
      options:
        - Game Library / UI
        - Game Launching (Wine / Proton)
        - Update Checker
        - Browser Extension
        - Settings / Configuration
        - Build / Packaging
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots about the feature request.
